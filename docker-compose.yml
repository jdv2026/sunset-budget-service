services:
  app:
    image: ${DOCKER_IMAGE}
    restart: unless-stopped
    volumes:
      - app_storage:/var/www/html/storage
    env_file:
      - .env
    networks:
      - sunset

  nginx:
    image: nginx:1.27-alpine
    restart: unless-stopped
    ports:
      - "${APP_PORT:-8000}:80"
    volumes:
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - app
    networks:
      - sunset


networks:
  sunset:
    driver: bridge

volumes:
  app_storage:
