name: Deploy

on:
  push:
    branches: [main]

permissions:
  contents: write
  packages: write

jobs:
  version:
    runs-on: ubuntu-latest

    outputs:
      new_version: ${{ steps.bump.outputs.new_version }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Bump version
        id: bump
        run: |
          COMMIT_MSG=$(git log -1 --pretty=%s)
          CURRENT=$(cat VERSION 2>/dev/null || echo "1.0.0")
          IFS='.' read -r MAJOR MINOR PATCH <<< "$CURRENT"

          if echo "$COMMIT_MSG" | grep -qi '\[major\]'; then
            MAJOR=$((MAJOR + 1)); MINOR=0; PATCH=0
          elif echo "$COMMIT_MSG" | grep -qi '\[minor\]'; then
            MINOR=$((MINOR + 1)); PATCH=0
          else
            PATCH=$((PATCH + 1))
          fi

          NEW="$MAJOR.$MINOR.$PATCH"
          echo "$NEW" > VERSION
          echo "new_version=$NEW" >> $GITHUB_OUTPUT

      - name: Commit version bump
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add VERSION
          git diff --staged --quiet || git commit -m "chore: bump version to $(cat VERSION) [skip ci]"
          git push

  test:
    runs-on: ubuntu-latest
    needs: version

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.4'
          extensions: mbstring, bcmath, zip, pcntl, pdo, pdo_mysql, openssl

      - name: Install dependencies
        run: composer install --no-interaction --prefer-dist

      - name: Create .env
        run: |
          touch .env
          echo "APP_NAME=PersonalHub" >> .env
          echo "APP_ENV=production" >> .env
          echo "APP_KEY=${{ secrets.APP_KEY }}" >> .env
          echo "APP_DEBUG=false" >> .env
          echo "APP_URL=http://localhost" >> .env
          echo "APP_LOCALE=en" >> .env
          echo "BCRYPT_ROUNDS=12" >> .env
          echo "LOG_LEVEL=debug" >> .env
          echo "DB_CONNECTION=sqlite" >> .env
          echo "APP_PORT=${{ secrets.APP_PORT }}" >> .env
          echo "APP_VERSION=${{ needs.version.outputs.new_version }}" >> .env

      - name: Run tests
        run: php artisan test

      - name: Run deploy
        run: php artisan deploy

  deploy:
    runs-on: ubuntu-latest
    needs: [test, version]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build and push image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ secrets.DOCKER_USERNAME }}/sunset-budget-service-api:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Create project directory on server
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          script: mkdir -p ${{ secrets.SERVER_PROJECT_PATH }}

      - name: Copy files to server
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          source: "docker-compose.yml,docker/nginx/default.conf"
          target: ${{ secrets.SERVER_PROJECT_PATH }}

      - name: Create .env on server
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          script: |
            ENV_FILE=${{ secrets.SERVER_PROJECT_PATH }}/.env
            printf '%s\n' \
              'APP_NAME=PersonalHub' \
              'APP_ENV=production' \
              'APP_KEY=${{ secrets.APP_KEY }}' \
              'APP_DEBUG=false' \
              'APP_URL=${{ secrets.APP_URL }}' \
              'APP_LOCALE=en' \
              'BCRYPT_ROUNDS=12' \
              'LOG_CHANNEL=stack' \
              'LOG_LEVEL=info' \
              'DB_CONNECTION=sqlite' \
              'DB_DATABASE=/var/www/html/storage/database.sqlite' \
              'SESSION_DRIVER=database' \
              'SESSION_LIFETIME=120' \
              'QUEUE_CONNECTION=database' \
              'CACHE_STORE=database' \
              'APP_PORT=${{ secrets.APP_PORT }}' \
              'APP_VERSION=${{ needs.version.outputs.new_version }}' \
              'AUTH_JWKS_URL=${{ secrets.AUTH_JWKS_URL }}' \
              'DOCKER_IMAGE=${{ secrets.DOCKER_USERNAME }}/sunset-budget-service-api:latest' \
              > "$ENV_FILE"

      - name: SSH and deploy
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          script: |
            cd ${{ secrets.SERVER_PROJECT_PATH }}
            echo ${{ secrets.DOCKER_PASSWORD }} | docker login -u ${{ secrets.DOCKER_USERNAME }} --password-stdin
            docker tag ${{ secrets.DOCKER_USERNAME }}/sunset-budget-service-api:latest ${{ secrets.DOCKER_USERNAME }}/sunset-budget-service-api:previous || true
            docker compose pull
            docker compose up -d
            sleep 5
            if ! docker compose exec -T app php artisan deploy; then
              echo "Deploy failed, rolling back..."
              docker tag ${{ secrets.DOCKER_USERNAME }}/sunset-budget-service-api:previous ${{ secrets.DOCKER_USERNAME }}/sunset-budget-service-api:latest
              docker compose up -d
              exit 1
            fi
